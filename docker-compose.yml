services:
  nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mkit

  app:
    build:
      context: .
      target: production
    restart: unless-stopped
    environment: &app-env
      APP_NAME: ${APP_NAME:-mkit-api}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://api.mkit.com.br}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mkit}
      DB_USERNAME: ${DB_USERNAME:-mkit}
      DB_PASSWORD: ${DB_PASSWORD:-mkit}
      SESSION_DRIVER: redis
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.mkit.com.br}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      FRONTEND_URL: ${FRONTEND_URL:-https://mkit.com.br}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET}
      INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI:-https://api.mkit.com.br/auth/instagram/callback}
      INSTAGRAM_TEST_TOKEN: ${INSTAGRAM_TEST_TOKEN:-}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-mkit.com.br,www.mkit.com.br}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mkit.com.br}
      CORS_SUPPORTS_CREDENTIALS: ${CORS_SUPPORTS_CREDENTIALS:-true}
      APP_ROLE: web
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - mkit

  queue:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      <<: *app-env
      APP_ROLE: worker
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mkit

  scheduler:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *app-env
      APP_ROLE: worker
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mkit

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-mkit}
      MYSQL_USER: ${DB_USERNAME:-mkit}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mkit}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mkit

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mkit

volumes:
  mysql_data:
  redis_data:
  storage_data:

networks:
  mkit:
    driver: bridge
